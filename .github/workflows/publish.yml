name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install system librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - name: Install dependencies
        run: BUILD_LIBRDKAFKA=0 npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npx eslint src

      - name: Verify package contents
        run: |
          npm run build
          npm pack --dry-run --json --ignore-scripts | node -e "
            const files = JSON.parse(require('fs').readFileSync(0, 'utf8'))[0].files.map(f => f.path);
            if (!files.some(f => f.startsWith('dist/'))) {
              console.error('npm pack does not include dist/ — build output missing from package');
              process.exit(1);
            }
            console.log('Package contains', files.length, 'files including dist/');
          "

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # testcontainers v12 (undici) requires Node >= 22 at runtime;
          # the shipped package itself still supports Node >= 20 (engines).
          node-version: 22
          cache: npm

      - name: Install system librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - name: Install dependencies
        run: BUILD_LIBRDKAFKA=0 npm ci

      - name: Integration tests
        run: npm run test:integration

  publish:
    needs: [test, integration]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs npm >= 11.5.1; runners bundle 10.x.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install system librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - name: Install dependencies
        run: BUILD_LIBRDKAFKA=0 npm ci

      - run: npm run build

      # No NODE_AUTH_TOKEN — authentication happens via the npm Trusted
      # Publisher (OIDC) configured for this repo + workflow on npmjs.com.
      - run: npm publish --access public --provenance
